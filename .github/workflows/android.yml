name: Android CI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Patch Pn532.kt
        run: |
          python3 - << 'PYEOF'
          content = open('app/src/main/java/com/mikai/android/nfc/Pn532.kt', 'r').read()
          content = content.replace('const val TFI_HOST_TO_PN532', 'val TFI_HOST_TO_PN532')
          content = content.replace('const val TFI_PN532_TO_HOST', 'val TFI_PN532_TO_HOST')
          content = content.replace('const val CMD_', 'val CMD_')
          content = content.replace('const val BRTY_', 'val BRTY_')
          open('app/src/main/java/com/mikai/android/nfc/Pn532.kt', 'w').write(content)
          print("Patch OK")
          PYEOF

      - name: Build APK
        run: gradle assembleDebug --no-daemon --project-dir .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MikaiAndroid-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

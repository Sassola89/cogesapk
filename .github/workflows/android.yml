name: Android CI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Ricrea Pn532.kt pulito
        run: |
          rm -f app/src/main/java/com/mikai/android/nfc/Pn532.kt
          mkdir -p app/src/main/java/com/mikai/android/nfc
          printf '%s\n' \
            'package com.mikai.android.nfc' \
            '' \
            'import android.util.Log' \
            'import com.mikai.android.usb.Acr122uDevice' \
            '' \
            'class Pn532(private val device: Acr122uDevice) {' \
            '' \
            '    fun initISO14443B(): Boolean {' \
            '        return sendCommand(0x4A, byteArrayOf(0x01, 0x03)) != null' \
            '    }' \
            '' \
            '    fun listPassiveTargetSrix4k(): Boolean {' \
            '        val r = sendCommand(0x4A, byteArrayOf(0x01, 0x06)) ?: return false' \
            '        return r.isNotEmpty() && r[0].toInt() > 0' \
            '    }' \
            '' \
            '    fun getFirmwareVersion(): String? {' \
            '        val r = sendCommand(0x02) ?: return null' \
            '        return if (r.size >= 3) "Ver=${r[1].toInt() and 0xFF}.${r[2].toInt() and 0xFF}" else null' \
            '    }' \
            '' \
            '    fun inCommunicateThru(data: ByteArray): ByteArray? {' \
            '        val r = sendCommand(0x42, data) ?: return null' \
            '        if (r.isEmpty()) return null' \
            '        if (r[0].toInt() and 0xFF != 0x00) { Log.e("Pn532","status err"); return null }' \
            '        return if (r.size > 1) r.copyOfRange(1, r.size) else ByteArray(0)' \
            '    }' \
            '' \
            '    private fun sendCommand(cmd: Int, data: ByteArray = ByteArray(0)): ByteArray? {' \
            '        val frame = buildFrame(0xD4, cmd, data)' \
            '        val raw = device.sendEscape(frame) ?: return null' \
            '        return parseFrame(raw)' \
            '    }' \
            '' \
            '    fun buildFrame(tfi: Int, cmd: Int, data: ByteArray): ByteArray {' \
            '        val n = 2 + data.size' \
            '        val f = ByteArray(n + 6)' \
            '        f[0]=0x00; f[1]=0x00; f[2]=0xFF.toByte()' \
            '        f[3]=n.toByte(); f[4]=((n.inv()+1) and 0xFF).toByte(); f[5]=tfi.toByte()' \
            '        f[6]=cmd.toByte(); var s=tfi+cmd' \
            '        for(i in data.indices){f[7+i]=data[i];s+=data[i].toInt()}' \
            '        f[7+data.size]=((s.inv()+1) and 0xFF).toByte(); f[8+data.size]=0x00' \
            '        return f' \
            '    }' \
            '' \
            '    private fun parseFrame(raw: ByteArray): ByteArray? {' \
            '        var i=0' \
            '        while(i<raw.size-1){if(raw[i]==0x00.toByte()&&raw[i+1]==0xFF.toByte())break;i++}' \
            '        if(i>=raw.size-1) return null' \
            '        i+=2; if(i>=raw.size) return null' \
            '        val len=raw[i++].toInt() and 0xFF; if(i>=raw.size) return null' \
            '        val lcs=raw[i++].toInt() and 0xFF' \
            '        if((len+lcs) and 0xFF!=0) return null' \
            '        if(i+len>raw.size) return null' \
            '        if(raw[i].toInt() and 0xFF!=0xD5) return null' \
            '        val ds=i+2; val de=i+len' \
            '        return if(de>ds) raw.copyOfRange(ds,de) else ByteArray(0)' \
            '    }' \
            '}' \
            > app/src/main/java/com/mikai/android/nfc/Pn532.kt
          echo "Pn532.kt creato: $(wc -l < app/src/main/java/com/mikai/android/nfc/Pn532.kt) righe"
          head -5 app/src/main/java/com/mikai/android/nfc/Pn532.kt

      - name: Build APK
        run: gradle assembleDebug --no-daemon --project-dir .

      - uses: actions/upload-artifact@v4
        with:
          name: MikaiAndroid-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

name: Android CI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Fix Pn532.kt via base64
        run: |
          echo "" | base64 -d > app/src/main/java/com/mikai/android/nfc/Pn532.kt
          echo "Pn532.kt riscritto, righe: $(wc -l < app/src/main/java/com/mikai/android/nfc/Pn532.kt)"

      - name: Build APK
        run: gradle assembleDebug --no-daemon --project-dir .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MikaiAndroid-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
